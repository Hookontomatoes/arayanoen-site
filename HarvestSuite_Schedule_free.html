<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HarvestSuite スケジュール Free | あらや農園™</title>
    <!-- PWA & iOS Support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="作付けFree">
    <link rel="apple-touch-icon" href="https://arayanoen.jp/img/icon-192.png">
    <style>
        :root {
            --primary: #2e7d32;
            --harvest: #fb8c00;
            --border: #cfd8dc;
            --day-size: 24px;
            --frost-bg: #e3f2fd;
            /* 霜注意報の背景色 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: sans-serif;
            background: #f1f8e9;
            overflow: hidden;
            height: 100vh;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        /* スクロールバーを見やすく強制 */
        ::-webkit-scrollbar {
            width: 14px;
            height: 14px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 7px;
            border: 3px solid #f1f1f1;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        header {
            background: var(--primary);
            color: white;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .btn-group {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn.active {
            background: white !important;
            color: var(--primary) !important;
        }

        .app-main {
            display: flex;
            height: calc(100vh - 50px); /* ヘッダー分 */
            overflow: hidden;
            position: relative;
        }

        .axis-fixed {
            background: #fafafa;
            overflow: hidden;
            z-index: 200;
            flex-shrink: 0;
            display: flex;
            white-space: nowrap;
            /* 折り返しを防止 */
            border-bottom: 2px solid var(--border);
        }

        .day-cell {
            background: white !important;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 4px 0;
            gap: 2px;
            overflow: hidden;
            flex-shrink: 0;
            border-right: 1px solid #f0f0f0;
            transition: background 0.2s;
        }

        .day-cell.frost-active {
            background: #e3f2fd !important;
            /* 霜注意報の背景色 */
        }

        .day-cell.month-sep {
            border-left: 2px solid #ccc;
        }

        .day-num {
            font-size: 11px;
            font-weight: bold;
            color: #333;
        }

        .day-term {
            font-size: 8px;
            color: #d32f2f;
            font-weight: bold;
            height: 10px;
            line-height: 10px;
        }

        .day-micro {
            font-size: 7px;
            color: #2e7d32;
            height: 10px;
            line-height: 10px;
        }

        .day-tide {
            font-size: 7px;
            color: #1976d2;
            height: 10px;
            line-height: 10px;
        }

        .day-lunar {
            font-size: 8px;
            color: #444;
            height: 22px;
            line-height: 10px;
            text-align: center;
            font-weight: bold;
        }

        .day-weather {
            font-size: 11px;
            height: 11px;
            line-height: 11px;
            white-space: nowrap;
        }

        .day-num,
        .day-term,
        .day-micro,
        .day-tide,
        .day-lunar {
            white-space: nowrap;
            /* 横方向の文字切れを防止 */
        }

        .day-temp {
            font-size: 8px;
            display: flex;
            gap: 3px;
            margin-top: 1px;
        }

        .t-max {
            color: #ef5350;
            font-weight: bold;
        }

        .t-min {
            color: #42a5f5;
            font-weight: bold;
        }

        .hist-temp {
            font-size: 7px;
            color: #999;
            margin-top: 0;
            line-height: 1;
        }

        .frost-warn {
            background-color: #e3f2fd !important;
        }

        .month-sep {
            background: #e8f5e9 !important;
            border-color: var(--primary) !important;
        }

        /* 全体表示時の調整 */
        .day-cell.small-view {
            padding: 0 !important;
            margin: 0 !important;
            border: none !important;
            background: transparent !important;
            justify-content: center;
            overflow: visible !important;
            /* 絶対条件：はみ出しを許可 */
            position: relative;
        }

        .small-view * {
            display: none !important;
        }

        .small-view .day-num {
            display: block !important;
            font-size: 10px !important;
            white-space: nowrap;
            opacity: 0;
            line-height: 1;
            position: absolute;
            /* 親が狭くても表示を維持 */
            z-index: 10;
        }

        .small-view.month-sep {
            background: #c8e6c9 !important;
            border-right: 0.5px solid var(--primary) !important;
            border-bottom: 0.5px solid var(--primary) !important;
            z-index: 5;
        }

        .small-view.month-sep .day-num {
            opacity: 1;
            color: var(--primary) !important;
            font-weight: bold !important;
        }

        /* PCは横並び、Mobileは縦並びのためラベルのズレを調整 */
        .is-pc .small-view.month-sep .day-num {
            top: 2px;
            left: 2px;
        }

        .is-mobile .small-view.month-sep .day-num {
            left: 4px;
            top: 2px;
        }

        .grid-scroll {
            flex: 1;
            overflow: auto;
            position: relative;
        }

        .field-col {
            min-width: 100%;
            border-bottom: 1px solid var(--border);
            background: white;
            position: relative;
            display: flex;
        }

        .field-header {
            background: white;
            border-right: 2px solid var(--primary);
            border-bottom: 1px solid var(--border);
            position: sticky;
            left: 0;
            z-index: 150;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
        }

        .data-layer {
            position: relative;
            flex: 1;
            min-height: 100%;
            pointer-events: auto;
        }

        .p-bar {
            position: absolute;
            pointer-events: none;
            z-index: 5;
        }

        /* 作業期間スパン（潅水・マルチ・トンネル・被覆などの期間帯） */
        /* 作業期間スパン: バー下端(PC)/右端(モバイル)に5pxストリップとして表示 */
        /* 作業期間帯（収穫バーと同じ見た目・ポジション） */
        .p-work-band {
            position: absolute;
            border-radius: 5px;
            z-index: 5;
            pointer-events: auto;
            cursor: pointer;
            display: flex;
            align-items: center;
            overflow: hidden;
            opacity: 0.88;
        }
        .p-work-band .wband-label {
            font-size: 9px;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 0 4px;
            font-weight: bold;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
            line-height: 1;
        }
        /* 前年繰り越し作業：左端破線 */
        .p-work-band.work-carryover {
            border-left: 3px dashed rgba(255,255,255,0.85);
        }
        @media (max-width: 768px) {
            .p-work-band.work-carryover {
                border-left: none;
                border-top: 3px dashed rgba(255,255,255,0.85);
            }
        }
        /* 作業種別ごとの色 */
        .p-work-band[data-wtype="w3"]  { background: #1976d2; } /* 潅水: 青 */
        .p-work-band[data-wtype="w9"]  { background: #5d4037; } /* マルチ: 茶 */
        .p-work-band[data-wtype="w10"] { background: #388e3c; } /* トンネル: 緑 */
        .p-work-band[data-wtype="w11"] { background: #7b1fa2; } /* 被覆: 紫 */
        /* 単日作業マークの日付ラベル（left/topはインラインで指定） */
        .p-mark-label {
            position: absolute;
            font-size: 9px;
            background: rgba(0,0,0,0.60);
            color: #fff;
            border-radius: 3px;
            padding: 1px 4px;
            white-space: nowrap;
            pointer-events: none;
            z-index: 101;
            line-height: 1.4;
            transform: none;
        }

        /* 前年からの繰り越し作付けバー */
        .p-bar.p-carryover .p-bar-line {
            border-left: 4px dashed rgba(255, 255, 255, 0.85);
        }
        @media (max-width: 768px) {
            .p-bar.p-carryover .p-bar-line {
                border-left: none;
                border-top: 4px dashed rgba(255, 255, 255, 0.85);
            }
        }
        .p-carryover-label {
            position: absolute;
            font-size: 8px;
            color: white;
            background: rgba(0, 0, 0, 0.40);
            border-radius: 2px;
            padding: 0 2px;
            pointer-events: none;
            z-index: 10;
            white-space: nowrap;
            line-height: 1.4;
        }
        .p-carryover-label.pc-label {
            left: 4px;
            top: 50%;
            transform: translateY(-50%);
        }
        .p-carryover-label.mob-label {
            top: 4px;
            left: 50%;
            transform: translateX(-50%);
        }

        .p-bar-line {
            background: #8bc34a;
            border-radius: 4px;
            position: absolute;
            box-shadow: inset 0 0 4px rgba(0, 0, 0, 0.2);
            pointer-events: auto;
            cursor: grab;
        }

        .p-icon,
        .p-mark {
            position: absolute;
            background: white;
            border: 2.5px solid #8bc34a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.25);
            z-index: 100;
            cursor: grab;
            pointer-events: auto;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .p-mark {
            border-color: #666;
            width: 30px;
            height: 30px;
        }

        .kama-svg {
            width: 22px;
            height: 22px;
            transform: rotate(-20deg);
        }

        .p-harvest {
            position: absolute;
            background: var(--harvest);
            z-index: 2;
            border-radius: 11px;
            pointer-events: none;
        }

        .p-resize-handle {
            position: absolute;
            width: 18px;
            height: 18px;
            background: #2e7d32;
            border: 2px solid white;
            border-radius: 50%;
            z-index: 150;
            cursor: pointer;
            pointer-events: auto;
        }

        @media (min-width: 769px) {
            .app-main {
                flex-direction: column;
                padding-bottom: 80px;
                /* パレットでスクロールバーが隠れないように調整 */
            }

            .grid-scroll {
                overflow-x: scroll !important;
            }

            .axis-fixed {
                overflow-x: scroll !important;
                height: 140px;
                /* renderUIで動的に設定されるがCSSでも確保 */
                padding-left: 140px;
                /* 見出し幅(140px)に合わせる */

                /* スクロールバーを非表示（gridと同期するので不要） */
                scrollbar-width: none;        /* Firefox */
                -ms-overflow-style: none;     /* IE/Edge */
            }

            .axis-fixed::-webkit-scrollbar {
                display: none;                /* Chrome / Safari */
            }

            /* ドラッグ可能なエリアにグラブカーソルを表示 */
            .data-layer {
                cursor: grab;
            }

            .field-col {
                height: 100px;
                width: max-content !important;
                /* 横幅を内容に合わせて拡張し、スクロールを発生させる */
                min-width: 100%;
                display: flex;
            }

            .field-header {
                width: 140px;
                /* 120から140に拡大してゆとりを持たせる */
                height: 100%;
            }

            .day-cell {
                height: 100%;
                /* 親の高さ(160px)に合わせる */
                min-height: 140px;
            }

            .p-bar-line {
                height: 8px;
                width: 100%;
                top: 50%;
                transform: translateY(-50%);
            }

            .p-harvest {
                top: 50%;
                height: 22px;
                transform: translateY(-50%);
            }

            .p-work-band {
                top: 50%;
                height: 16px;
                transform: translateY(-50%);
            }

            .p-harvest.tbd {
                background: linear-gradient(to right, var(--harvest) 0%, rgba(251, 140, 0, 0) 100%);
                clip-path: polygon(0% 0%, 100% 35%, 100% 65%, 0% 100%);
            }

            .p-icon,
            .p-mark {
                top: 50%;
                transform: translate(-50%, -50%);
                width: 34px;
                height: 34px;
            }

            .p-resize-handle {
                right: -9px;
                top: 50%;
                transform: translateY(-50%);
                cursor: ew-resize;
            }
        }

        @media (max-width: 768px) {
            .app-main {
                flex-direction: row;
            }

            .axis-fixed {
                width: 100px;
                height: 100%;
                flex-direction: column;
                border-right: 2px solid var(--border);
                border-bottom: none; /* PC用のborder-bottomを打ち消す */
                padding-top: 40px;
                /* フィールドヘッダーの高さ(40px)に合わせる */
                overflow: hidden; /* scrollTop同期のため明示的に指定 */
                position: relative;
            }

            /* モバイル用：軸（日付）側の高さ調整用スペーサー */
            #axisHeaderSpacer {
                height: 40px;
                flex-shrink: 0;
                background: #fafafa;
                border-bottom: 2px solid var(--primary);
            }

            .grid-scroll {
                flex: 1;
                overflow: auto;
                display: flex;
                align-items: flex-start; /* field-colを内容の高さ(年間分)に合わせる */
            }

            .field-col {
                min-width: 140px;
                display: flex;
                flex-direction: column;
                border-right: 1px solid var(--border);
                flex-shrink: 0;
            }

            .field-header {
                height: 40px;
                position: sticky;
                top: 0;
                left: auto;
                border-bottom: 2px solid var(--primary);
                z-index: 100;
                background: white;
                width: 100%; /* 列幅いっぱいに広げる */
            }

            .day-cell {
                width: 100px;
                border-bottom: 1px solid #f0f0f0;
                padding: 3px 2px;
                gap: 1px;
                overflow: hidden; /* dsより大きい内容は隠す */
            }

            /* モバイル：day-numの高さをブラウザ依存にさせない */
            .day-num {
                height: 13px;
                line-height: 13px;
            }

            /* モバイル：旧暦2行(計22px)をそのまま表示。height制限しない */
            .day-lunar {
                height: 22px;
                line-height: 10px;
            }

            .p-bar-line {
                width: 8px;
                height: 100%;
                left: 50%;
                transform: translateX(-50%);
            }

            .p-harvest {
                left: 50%;
                width: 22px;
                transform: translateX(-50%);
            }

            .p-work-band {
                left: 50%;
                width: 16px;
                transform: translateX(-50%);
                flex-direction: column;
                justify-content: flex-start;
            }

            .p-harvest.tbd {
                background: linear-gradient(to bottom, var(--harvest) 0%, rgba(251, 140, 0, 0) 100%);
                clip-path: polygon(0% 0%, 100% 0%, 75% 100%, 25% 100%);
            }

            .p-icon,
            .p-mark {
                left: 50%;
                transform: translate(-50%, -50%);
                width: 34px;
                height: 34px;
            }

            .p-resize-handle {
                bottom: -9px;
                left: 50%;
                transform: translateX(-50%);
                cursor: ns-resize;
            }
        }

        #printArea {
            display: none;
        }


        /* モバイルヘッダー: 画面幅が狭い場合にブランドテキストを非表示 */
        @media (max-width: 480px) {
            #brand-text-main { display: none !important; }
            #brand-text-sub  { display: none !important; }
        }
        @media (max-width: 600px) {
            .btn-label-hide { display: none; }
        }
        @media print {
            @page {
                size: A4 portrait;
                margin: 0;
            }

            html,
            body {
                overflow: visible !important;
                height: auto !important;
                background: white;
                margin: 0 !important;
                padding: 0 !important;
            }

            header,
            .palette,
            .app-main,
            #dateTip,
            #mobileHeaderRow,
            #free-limit-bar,
            .modal {
                display: none !important;
            }

            #printArea {
                display: block !important;
                width: 210mm;
            }

            .print-page {
                width: 210mm;
                height: 285mm; /* スマホのシステム余白誤差を吸収するため十分に短く設定 */
                padding: 10mm;
                break-after: page;
                break-inside: avoid;
                position: relative;
                box-sizing: border-box;
                background: white;
                overflow: hidden;
            }

            .print-page:last-child {
                break-after: auto !important;
            }

            .print-title {
                font-size: 16pt;
                font-weight: bold;
                border-bottom: 2pt solid black;
                margin-bottom: 5mm;
                display: flex;
                justify-content: space-between;
            }

            .print-grid {
                display: flex;
                flex-direction: column;
                border: 0.5pt solid black;
                height: 247mm;
                position: relative;
                overflow: hidden;
            }

            .date-row-print {
                height: 10mm;
                border-bottom: 0.5pt solid black;
                display: flex;
                background: #f5f5f5;
                flex-shrink: 0;
            }

            .date-spacer-print {
                width: 30mm;
                border-right: 0.5pt solid black;
                flex-shrink: 0;
            }

            .date-labels-print {
                flex: 1;
                position: relative;
                overflow: hidden;
            }

            .month-marker-print {
                position: absolute;
                top: 0;
                height: 100%;
                border-left: 0.3pt solid #888;
                padding-left: 2mm;
                font-size: 10pt;
                font-weight: bold;
                display: flex;
                align-items: center;
                white-space: nowrap;
            }

            .f-row-print {
                height: 25mm;
                border-bottom: 0.2pt solid #666;
                display: flex;
                position: relative;
            }

            .f-name-print {
                width: 30mm;
                border-right: 0.5pt solid black;
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: bold;
                font-size: 10pt;
                background: #fafafa;
            }

            .f-data-print {
                flex: 1;
                position: relative;
                overflow: hidden;
            }

            .nori {
                position: absolute;
                width: 15mm;
                height: 100%;
                top: 0;
                background: repeating-linear-gradient(45deg, #eee 0mm, #eee 3mm, #fff 3mm, #fff 6mm);
                border-left: 0.3pt dashed red;
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 100;
            }

            .nori-right {
                right: 0;
            }

            .nori-left {
                left: 0;
                border-left: none;
                border-right: 0.3pt dashed red;
            }

            .nori-label {
                transform: rotate(90deg);
                color: red;
                font-size: 8pt;
                font-weight: bold;
                white-space: nowrap;
            }
        }

        .palette {
            position: fixed;
            bottom: 0;
            /* 下端にぴったりつける */
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px 20px 0 0;
            padding: 12px;
            padding-top: 25px;
            /* ハンドル分のスペース */
            box-shadow: 0 -4px 30px rgba(0, 0, 0, 0.2);
            z-index: 2000;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 折りたたみ状態 */
        .palette.collapsed {
            transform: translateY(calc(100% - 25px));
            /* ハンドルだけ残して沈める */
        }

        /* つまみ（ハンドル） */
        .pal-handle {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .pal-handle::after {
            content: "";
            width: 40px;
            height: 4px;
            background: #ccc;
            border-radius: 2px;
        }

        .pal-row {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 5px;
            transition: opacity 0.2s;
        }

        .palette.collapsed .pal-row {
            opacity: 0;
            pointer-events: none;
        }

        .p-btn {
            flex-shrink: 0;
            width: 52px;
            height: 52px;
            background: white;
            border: 1.5px solid #eee;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
        }

        .p-btn span {
            font-size: 8px;
            color: #777;
            margin-top: 2px;
            font-weight: bold;
        }

        #dateTip {
            position: fixed;
            background: #333;
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            pointer-events: none;
            display: none;
            z-index: 5000;
        }

        .ghost {
            opacity: 0.7;
            pointer-events: none;
            position: fixed;
            z-index: 6000;
            transform: scale(1.4);
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            border-radius: 50%;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }

        .modal-inner {
            background: white;
            padding: 25px;
            border-radius: 25px;
            width: 90%;
            max-width: 440px;
            text-align: center;
            max-height: 90vh;
            overflow-y: auto;
        }

        /* マスター編集用スタイル */
        .master-form {
            text-align: left;
        }

        .master-form label {
            display: block;
            margin-top: 10px;
            font-size: 12px;
            font-weight: bold;
            color: #666;
        }

        .master-form input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-top: 4px;
        }

        .master-item-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }

        .master-item-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            border: 1px solid #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .master-item-info {
            flex: 1;
        }

        .master-item-name {
            font-weight: bold;
            font-size: 14px;
        }

        .master-actions {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .btn-add {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        .search-result-item {
            padding: 10px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            font-size: 13px;
        }

        .search-result-item:hover {
            background: #f0f0f0;
        }
    </style>
</head>

        function getLunarInfo(d) {
            const refMoon = new Date(2026, 1, 17); // 2026/2/17が旧1/1
            const age = ((d - refMoon) / 86400000 % 29.53 + 29.53) % 29.53;
            const emojis = ["🌑", "🌒", "🌓", "🌔", "🌕", "🌖", "🌗", "🌘"];
            const emoji = emojis[Math.floor((age + 1.84) / 3.69) % 8] || "🌑";
            let totalDays = Math.floor((d - refMoon) / 86400000);
            let m, day;
            if (totalDays < 0) {
                let offset = Math.floor((d - new Date(2026, 0, 1)) / 86400000);
                day = 12 + offset; m = 11;
                if (day > 30) { m = 12; day -= 30; }
                if (day <= 0) { m = 11; day += 30; }
                return `<div style="height:10px;">${emoji}${age.toFixed(1)}</div><div style="font-size:8px;color:#cc7a00;margin-top:1px;">${KANJI_M[m]}${KANJI_D[Math.max(1, Math.min(30, day))]}</div>`;
            }
            m = 1; let tempDays = totalDays;
            while (tempDays >= 29) {
                let monthLen = (m % 2 === 1) ? 30 : 29;
                if (tempDays < monthLen) break;
                tempDays -= monthLen; m++;
            }
            let monthIdx = ((m - 1) % 12) + 1;
            let dayIdx = Math.min(30, tempDays + 1);
            return `<div style="height:10px;">${emoji}${age.toFixed(1)}</div><div style="font-size:8px;color:#cc7a00;margin-top:1px;">${KANJI_M[monthIdx]}${KANJI_D[dayIdx]}</div>`;
        }

        function renderCalendar(isPC, ds) {
            const axis = document.getElementById('axisFixed'), grid = document.getElementById('gridScroll');
            const totalDays = 365; // 2026年は365日
            const base = new Date(2026, 0, 1);
            const isSmall = ds < 10;
            const totalW = (totalDays * ds);

            // クラスでPC/Mobileを切り替え
            [axis, grid].forEach(el => {
                if (el) {
                    el.classList.toggle('is-pc', isPC);
                    el.classList.toggle('is-mobile', !isPC);
                }
            });

            let axContent = '';
            for (let i = 0; i < totalDays; i++) {
                const d = new Date(base); d.setDate(base.getDate() + i);
                const dsStr = formatDate(d);
                const mmdd = ("0" + (d.getMonth() + 1)).slice(-2) + ("0" + d.getDate()).slice(-2);
                const wData = state.weather[dsStr];
                const age = ((d - new Date(2026, 1, 17)) / 86400000 % 29.53 + 29.53) % 29.53;
                const tide = (Math.floor(age) + 1 === 1 || Math.floor(age) + 1 === 15) ? "大潮" : "中潮";

                // --- 当年の天気（実績：昨日まで ＋ 予報：今日から1週間分のみ） ---
                const diffToToday = Math.floor((d.setHours(0, 0, 0, 0) - (new Date()).setHours(0, 0, 0, 0)) / 86400000);
                let curIcon = '';
                let tempHtml = '';
                // 予報1週間分(diffToToday <= 7) かつ wDataが存在する場合（実績もここに含まれるように取得設定）
                if (diffToToday <= 7 && wData) {
                    curIcon = WMO_MAP[wData?.code] || '';
                    tempHtml = `<div class="day-temp"><span class="t-max">${Math.round(wData.max)}°</span><span class="t-min">${Math.round(wData.min)}°</span></div>`;
                }

                // --- 前年比較（ボタンONの時のみ表示） ---
                let histHtml = '';
                if (state.compare && !isSmall) {
                    const histD = new Date(d); histD.setFullYear(2025);
                    const histDsStr = formatDate(histD);
                    const hData = state.histWeather[histDsStr];
                    if (hData) {
                        const hIcon = WMO_MAP[hData.code] || '';
                        histHtml = `
                            <div class="hist-icon" style="font-size:12px; height:12px; margin-top:1px;">${hIcon}</div>
                            <div class="hist-temp" style="font-size:8px; line-height:10px;">前:${Math.round(hData.max)}/${Math.round(hData.min)}</div>
                        `;
                    }
                }

                // 霜注意報の判定（当日・予報期間のみ有効、かつ3度未満、かつスイッチON）
                const isFrost = state.frost && (diffToToday >= 0 && diffToToday <= 7) && (wData?.min < 3);

                let cellClass = `day-cell ${d.getDate() === 1 ? 'month-sep' : ''} ${isSmall ? 'small-view' : ''} ${isFrost ? 'frost-active' : ''}`;
                let cellStyle = isPC ? `padding:0; min-width:${ds}px; width:${ds}px; gap:1px; height:150px;` : `padding:0; height:${ds}px; min-height:${ds}px; width:100px;`;

                axContent += `<div class="${cellClass}" style="${cellStyle} flex-shrink:0;">
                    <div class="day-weather">${curIcon}</div>
                    <div class="day-num" style="color: ${d.getDay() === 0 ? '#d32f2f' : d.getDay() === 6 ? '#1976d2' : '#333'}">${d.getDate() === 1 ? (d.getMonth() + 1) + '月' : (isSmall ? '' : d.getDate())}</div>
                    ${isSmall ? '' : tempHtml}
                    ${isSmall ? '' : histHtml}
                    <div class="day-term" style="font-size:7px; height:9px;">${SOLAR_TERMS[mmdd] || ''}</div>
                    <div class="day-micro" style="font-size:6px; height:8px;">${MICRO_SEASONS[mmdd] || ''}</div>
                    <div class="day-tide" style="font-size:6px; height:8px;">${tide}</div>
                    <div class="day-lunar">${getLunarInfo(d)}</div>
                </div>`;
            }
            if (isPC) {
                axis.innerHTML = `<div style="display:flex; width:${totalW}px; flex-shrink:0;">${axContent}</div>`;
            } else {
                const totalH = totalDays * ds;
                // モバイル：ヘッダー高さを合わせるためスペーサーから開始
                axis.innerHTML = `<div id="axisHeaderSpacer"></div><div style="display:flex; flex-direction:column; height:${totalH}px; flex-shrink:0;">${axContent}</div>`;
            }
            grid.innerHTML = state.fields.map(f => {
                const totalGridW = totalW;
                const layerStyle = isPC ? `width:${totalGridW}px;` : `width:100px; height:${totalDays * ds}px; min-height:100px; background:white;`;
                return `<div class="field-col" style="${isPC ? 'width:' + (totalGridW + 140) + 'px' : 'width:100px;'}">
                    <div class="field-header" style="width:${isPC ? 140 : 100}px;">${f.name}</div>
                    <div class="data-layer" data-field-id="${f.id}" style="${layerStyle} flex-shrink:0;"></div>
                </div>`;
            }).join('');
        }

        function renderPlantings(isPC, ds) {
            const base = new Date(2026, 0, 1);

            // 圃場ごとに作付けをグループ分けしてレーン計算
            const fieldMap = {};
            state.plantings.forEach(p => {
                if (!fieldMap[p.fieldId]) fieldMap[p.fieldId] = [];
                fieldMap[p.fieldId].push(p);
            });

            state.fields.forEach(f => {
                const layer = document.querySelector(`[data-field-id="${f.id}"]`);
                if (!layer) return;

                const fPlantings = fieldMap[f.id] || [];
                // 開始日順にソート
                fPlantings.sort((a, b) => new Date(a.start) - new Date(b.start));

                const lanes = [];
                const _laneBase = new Date(2026, 0, 1);
                fPlantings.forEach(p => {
                    // 前年からの繰り越しは1月1日を実効開始日としてレーン重複を判定
                    const _effectiveStart = new Date(Math.max(new Date(p.start).getTime(), _laneBase.getTime()));
                    let assignedLane = -1;
                    for (let i = 0; i < lanes.length; i++) {
                        if (_effectiveStart > lanes[i]) {
                            assignedLane = i;
                            break;
                        }
                    }
                    if (assignedLane === -1) {
                        assignedLane = lanes.length;
                        lanes.push(new Date(p.end));
                    } else {
                        lanes[assignedLane] = new Date(p.end);
                    }
                    p.laneIndex = assignedLane;
                });

                // レーン数に応じて圃場の高さを調整
                const laneSize = 35;
                const totalSize = Math.max(100, (lanes.length * laneSize) + 20);
                const col = layer.closest('.field-col');
                const header = col.querySelector('.field-header');
                if (isPC) {
                    col.style.height = totalSize + 'px';
                    header.style.height = totalSize + 'px';
                } else {
                    col.style.minWidth = totalSize + 'px';
                    header.style.width = totalSize + 'px';
                }

                fPlantings.forEach(p => {
                    const crop = state.master.crops.find(c => c.id === p.cropId);
                    if (!crop) return;

                    const base = new Date(2026, 0, 1);
                    const sIdx = diffDays(base, new Date(p.start)), eIdx = diffDays(base, new Date(p.end));

                    // 表示範囲外は完全にスキップ
                    if (eIdx < 0 || sIdx > 365) return;

                    // 前年からの繰り越しかどうか判定
                    const isCarryover = sIdx < 0;
                    const clampedSIdx = Math.max(0, sIdx);

                    const bar = document.createElement('div');
                    bar.className = isCarryover ? 'p-bar p-carryover' : 'p-bar';
                    bar.dataset.pid = p.id; // ドロップ先判定用
                    // ダブルクリックで編集パネルを開く（ネイティブイベント）
                    (function(_pid) {
                        bar.addEventListener('dblclick', function(e) { e.stopPropagation(); openPnl('p', _pid); });
                    })(p.id);

                    const pos = clampedSIdx * ds;
                    const len = (eIdx - clampedSIdx + 1) * ds;
                    const offset = (p.laneIndex * laneSize) + 10;

                    if (isPC) {
                        bar.style.left = pos + 'px';
                        bar.style.width = len + 'px';
                        bar.style.top = offset + 'px';
                        bar.style.height = (laneSize - 5) + 'px';
                    }
                    else {
                        bar.style.top = pos + 'px';
                        bar.style.height = len + 'px';
                        bar.style.left = offset + 'px';
                        bar.style.width = (laneSize - 5) + 'px';
                    }

                    let h = `<div class="p-bar-line" data-pid="${p.id}" style="${isPC ? 'top:50%;height:8px' : 'left:50%;width:8px'}"></div>`;
                    h += `<div class="p-resize-handle" data-pid="${p.id}"></div>`;

                    // アイコン描画
                    let iconStyle = "";
                    let isSvg = crop.icon && crop.icon.startsWith('<svg');
                    if (crop.icon.length > 2 && !isSvg) iconStyle = `background-image:url(${crop.icon}); font-size:0;`;
                    h += `<div class="p-icon" data-pid="${p.id}" style="${isPC ? 'left:0;top:50%' : 'top:0;left:50%'}; ${iconStyle}">${isSvg ? crop.icon : (crop.icon.length <= 2 ? crop.icon : '')}</div>`;

                    if (p.hStart) {
                        const hsIdx = diffDays(base, new Date(p.hStart));
                        let heIdx = p.hEnd ? diffDays(base, new Date(p.hEnd)) : eIdx;
                        // クランプ後バー左端からのオフセットで計算
                        const hPos = (hsIdx - clampedSIdx) * ds, hLen = (heIdx - hsIdx + 1) * ds;
                        if (isPC) h += `<div class="p-harvest ${!p.hEnd ? 'tbd' : ''}" style="left:${hPos}px; width:${Math.max(ds, hLen)}px;"></div>`;
                        else h += `<div class="p-harvest ${!p.hEnd ? 'tbd' : ''}" style="top:${hPos}px; height:${Math.max(ds, hLen)}px;"></div>`;
                    }
                    // data-layerに直接追加するラベルを収集
                    const evLabels = [];

                    if (p.events) p.events.forEach((ev, idx) => {
                        const m = state.master.works.find(x => x.id === ev.type);
                        if (!m) return;

                        const evDate = new Date(ev.date);
                        const dLabel = (evDate.getMonth() + 1) + '/' + evDate.getDate();
                        const isWCarryover = diffDays(base, evDate) < 0;
                        const evColor = ev.color || defaultWorkColor(ev.type);
                        const carryoverCls = isWCarryover ? ' work-carryover' : '';
                        const cMark = isWCarryover ? '◀ ' : '';

                        if (ev.isSpan || ev.endDate) {
                            const wSIdx = diffDays(base, evDate);
                            const clampedWSIdx = Math.max(0, wSIdx);
                            const wPos = (clampedWSIdx - clampedSIdx) * ds;

                            if (ev.endDate) {
                                // 終了日あり → ソリッドな帯
                                const wEIdx = diffDays(base, new Date(ev.endDate));
                                const wLen = (wEIdx - clampedWSIdx + 1) * ds;
                                const endLabel = (new Date(ev.endDate).getMonth() + 1) + '/' + new Date(ev.endDate).getDate();
                                const spanLabel = cMark + dLabel + '〜' + endLabel;
                                if (isPC) {
                                    h += `<div class="p-work-band${carryoverCls}" data-wtype="${ev.type}" data-pid="${p.id}" data-idx="${idx}" style="left:${wPos}px;width:${wLen}px;background:${evColor};"></div>`;
                                    // ラベル：data-layer 上で バー上辺より上
                                    evLabels.push({ text: spanLabel, lx: pos + wPos, ly: offset - 14, tx: pos + wPos, ty: pos + wPos });
                                } else {
                                    h += `<div class="p-work-band${carryoverCls}" data-wtype="${ev.type}" data-pid="${p.id}" data-idx="${idx}" style="top:${wPos}px;height:${wLen}px;background:${evColor};"></div>`;
                                    evLabels.push({ text: spanLabel, lx: offset - 14, ly: pos + wPos, tx: pos + wPos, ty: pos + wPos });
                                }
                            } else {
                                // 終了未定 → グラデーション
                                const wLen = (eIdx - clampedWSIdx + 1) * ds;
                                const rgba0 = hexToRgba(evColor, 0);
                                const gradPC  = `linear-gradient(to right, ${evColor} 0%, ${rgba0} 100%)`;
                                const gradMob = `linear-gradient(to bottom, ${evColor} 0%, ${rgba0} 100%)`;
                                const clipPC  = `polygon(0% 0%, 100% 35%, 100% 65%, 0% 100%)`;
                                const clipMob = `polygon(0% 0%, 100% 0%, 75% 100%, 25% 100%)`;
                                const startLabel = cMark + dLabel + '〜';
                                if (isPC) {
                                    h += `<div class="p-work-band tbd${carryoverCls}" data-wtype="${ev.type}" data-pid="${p.id}" data-idx="${idx}" style="left:${wPos}px;width:${wLen}px;background:${gradPC};clip-path:${clipPC};"></div>`;
                                    evLabels.push({ text: startLabel, lx: pos + wPos, ly: offset - 14, tx: pos + wPos, ty: pos + wPos });
                                } else {
                                    h += `<div class="p-work-band tbd${carryoverCls}" data-wtype="${ev.type}" data-pid="${p.id}" data-idx="${idx}" style="top:${wPos}px;height:${wLen}px;background:${gradMob};clip-path:${clipMob};"></div>`;
                                    evLabels.push({ text: startLabel, lx: offset - 14, ly: pos + wPos, tx: pos + wPos, ty: pos + wPos });
                                }
                            }
                            // 期間作業の開始位置にもアイコン円を表示（単発と同様）
                            const isMSpan = m.icon && m.icon.startsWith('<svg');
                            let spanMarkStyle = `border-color:${evColor};`;
                            if (m.icon && m.icon.length > 2 && !isMSpan) spanMarkStyle += `background-image:url(${m.icon}); font-size:0;`;
                            h += `<div class="p-mark" data-pid="${p.id}" data-idx="${idx}" style="${isPC ? 'left:' + wPos + 'px;top:50%' : 'top:' + wPos + 'px;left:50%'}; ${spanMarkStyle}">${isMSpan ? m.icon : (m.icon && m.icon.length <= 2 ? m.icon : '')}</div>`;
                        } else {
                            // 単発作業 → アイコン円
                            const ep = (diffDays(new Date(p.start), evDate) + (sIdx - clampedSIdx)) * ds + (ds / 2);
                            let markIconStyle = `border-color:${evColor};`;
                            let isMSvg = m.icon && m.icon.startsWith('<svg');
                            if (m.icon && m.icon.length > 2 && !isMSvg) markIconStyle += `background-image:url(${m.icon}); font-size:0;`;
                            h += `<div class="p-mark" data-pid="${p.id}" data-idx="${idx}" style="${isPC ? 'left:' + ep + 'px;top:50%' : 'top:' + ep + 'px;left:50%'}; ${markIconStyle}">${isMSvg ? m.icon : (m.icon && m.icon.length <= 2 ? m.icon : '')}</div>`;
                            // ラベル：data-layer 上でバーの上辺より上
                            if (isPC) evLabels.push({ text: cMark + dLabel, lx: pos + ep - 10, ly: offset - 14, tx: 0, ty: 0 });
                            else      evLabels.push({ text: cMark + dLabel, lx: offset - 14, ly: pos + ep - 10, tx: 0, ty: 0 });
                        }
                    });
                    bar.innerHTML = h;

                    // 同日複数アイコンのサイクル表示（2秒ごとに切り替え）
                    (function() {
                        const marks = Array.from(bar.querySelectorAll('.p-mark'));
                        const posMap = {};
                        marks.forEach(function(mk) {
                            const posKey = isPC ? mk.style.left : mk.style.top;
                            if (!posMap[posKey]) posMap[posKey] = [];
                            posMap[posKey].push(mk);
                        });
                        Object.values(posMap).forEach(function(group) {
                            if (group.length > 1) {
                                group.forEach(function(mk, i) {
                                    mk.style.opacity = i === 0 ? '1' : '0';
                                    mk.style.transition = 'opacity 0.4s ease';
                                    mk.title = group.length + '件（タップで編集）';
                                });
                                let cur = 0;
                                const id = setInterval(function() {
                                    group[cur].style.opacity = '0';
                                    cur = (cur + 1) % group.length;
                                    group[cur].style.opacity = '1';
                                }, 2000);
                                _cycleIntervals.push(id);
                            }
                        });
                    })();

                    // p-mark / p-work-band にダブルクリックで作業編集パネルを開く
                    bar.querySelectorAll('.p-mark, .p-work-band').forEach(function(mk) {
                        mk.addEventListener('dblclick', function(e) {
                            e.stopPropagation();
                            openPnl('m', mk.dataset.pid, mk.dataset.idx);
                        });
                    });

                    // 前年繰り越しラベル (◀ 開始月/日〜) をバー先頭に追加
                    if (isCarryover) {
                        const _origStart = new Date(p.start);
                        const _label = document.createElement('div');
                        _label.className = `p-carryover-label ${isPC ? 'pc-label' : 'mob-label'}`;
                        _label.textContent = `◀ ${_origStart.getMonth() + 1}/${_origStart.getDate()}〜`;
                        bar.appendChild(_label);
                    }

                    layer.appendChild(bar);

                    // 日付ラベルをdata-layer直下に追加（バーの外・上側）
                    evLabels.forEach(function(lbl) {
                        const el = document.createElement('div');
                        el.className = 'p-mark-label';
                        el.textContent = lbl.text;
                        el.style.position = 'absolute';
                        el.style.left = Math.max(0, lbl.lx) + 'px';
                        el.style.top  = Math.max(0, lbl.ly) + 'px';
                        el.style.zIndex = '200';
                        layer.appendChild(el);
                    });
                });
            });

            // 前年比較 (実績があれば表示)
            if (state.compare) state.plantings.forEach(p => {
                const layer = document.querySelector(`[data-field-id="${p.fieldId}"]`);
                if (!layer) return;

                // 1年後の日付を計算して現在のカレンダー位置に投影
                const dStart = new Date(p.start); dStart.setFullYear(dStart.getFullYear() + 1);
                const dEnd = new Date(p.end); dEnd.setFullYear(dEnd.getFullYear() + 1);

                const sIdx = diffDays(base, dStart), eIdx = diffDays(base, dEnd);
                // 表示範囲外ならスキップ (おおよそ半年〜1年の差分があるものだけ表示)
                if (eIdx < 0 || sIdx > 366) return;

                const cBar = document.createElement('div'); cBar.className = 'p-bar';
                cBar.style.opacity = '0.3'; cBar.style.pointerEvents = 'none'; // 比較用は触らせない
                const pos = sIdx * ds, len = (eIdx - sIdx + 1) * ds;

                const laneSize = 35;
                const offset = ((p.laneIndex || 0) * laneSize) + 10;

                if (isPC) { cBar.style.left = pos + 'px'; cBar.style.width = len + 'px'; cBar.style.top = offset + 'px'; cBar.style.height = (laneSize - 5) + 'px'; }
                else { cBar.style.top = pos + 'px'; cBar.style.height = len + 'px'; cBar.style.left = offset + 'px'; cBar.style.width = (laneSize - 5) + 'px'; }

                // アイコン取得
                const crop = state.master.crops.find(c => c.id === p.cropId);
                let iconHtml = '';
                if (crop) {
                    let iconStyle = "";
                    let isSvg = crop.icon && crop.icon.startsWith('<svg');
                    if (crop.icon.length > 2 && !isSvg) iconStyle = `background-image:url(${crop.icon}); font-size:0;`;
                    iconHtml = `<div class="p-icon" style="${isPC ? 'left:0;top:50%' : 'top:0;left:50%'}; ${iconStyle}">${isSvg ? crop.icon : (crop.icon.length <= 2 ? crop.icon : '')}</div>`;
                }

                cBar.innerHTML = `<div class="p-bar-line" style="${isPC ? 'top:50%;height:8px;background:#ccc' : 'left:50%;width:8px;background:#ccc'}"></div>${iconHtml}`;
                layer.appendChild(cBar);
            });
        }

        function renderUI() {
            // 同日サイクルインターバルをクリア（再レンダリング時の蓄積防止）
            _cycleIntervals.forEach(id => clearInterval(id));
            _cycleIntervals = [];
            const isPC = window.innerWidth > 768;
            const appMain = document.querySelector('.app-main');
            const axis = document.getElementById('axisFixed');
            const grid = document.getElementById('gridScroll');
            if (!appMain || !axis || !grid) return;

            // スマホ全体表示時: ds計算前にパレットを描画して正確な高さを取得する
            renderPalette();

            let ds;
            if (state.zoom < 0.5) {
                // 全体表示: 366日をフィットさせる
                if (isPC) {
                    const avail = window.innerWidth - 140; // ヘッダー幅を考慮
                    ds = avail / 367;
                    grid.style.height = ''; // 通常のflexレイアウトに戻す
                } else {
                    // ヘッダーの実際の高さを直接測定してusableな高さを算出
                    const headerEl = document.querySelector('header');
                    const headerH = headerEl ? headerEl.offsetHeight : 60;
                    const usable = window.innerHeight - headerH - getMobilePaletteH();
                    ds = (usable - 40) / 365;
                    grid.style.height = usable + 'px'; // grid-scrollをusableな高さに固定
                }
            } else {
                ds = (isPC ? 60 : 110) * state.zoom; // PCは60px / Mobileは全項目が入る110px基準
                grid.style.height = ''; // 通常表示ではflexレイアウトに戻す
            }

            renderCalendar(isPC, ds); renderPlantings(isPC, ds);

            if (isPC) {
                // PC版: モバイル残留スタイルを完全リセットしてから設定
                axis.scrollTop = 0;           // モバイルで残った縦スクロール位置をリセット
                axis.style.overflow = '';     // モバイルの overflow:hidden 残留を消去
                axis.style.overflowX = 'scroll';
                axis.style.overflowY = 'hidden';
                axis.style.width = '100%';
                axis.style.height = '140px';
                grid.style.overflowX = 'scroll';
                grid.onscroll = () => { axis.scrollLeft = grid.scrollLeft; };
                axis.onscroll = () => { grid.scrollLeft = axis.scrollLeft; };
            } else {
                // モバイル版: PC残留スタイルをリセットしてから設定
                axis.scrollLeft = 0;          // PCで残った横スクロール位置をリセット
                axis.style.overflow = '';     // リセット
                axis.style.overflowX = 'hidden'; // スクロールバー非表示
                axis.style.overflowY = 'hidden'; // scrollTop同期のため非表示
                axis.style.width = '100px';
                axis.style.height = '100%';
                
                // モバイル：スクロール同期
                grid.onscroll = () => {
                    axis.scrollTop = grid.scrollTop;
                };
            }
            const btnZoom = document.getElementById('btnZoom');
            if (btnZoom) btnZoom.innerText = (state.zoom < 0.5) ? '🔍 通常表示' : '🔍 全体表示';
            const btnFrost = document.getElementById('btnFrost');
            if (btnFrost) btnFrost.classList.toggle('active', state.frost);
            // Free版ステータスバー更新
            if (IS_FREE) {
                const st = document.getElementById('free-status-text');
                if (st) st.textContent = `Free版：作物配置 ${state.plantings.length}/3 | 圃場 ${state.fields.length}/1`;
            }
        }

        function renderPalette() {
            const cropHtml = state.master.crops.map(c => {
                let style = "";
                let content = c.icon.length <= 2 ? c.icon : '';
                if (c.icon && c.icon.startsWith('<svg')) {
                    content = c.icon;
                } else if (c.icon.length > 2) {
                    style = `background-image:url(${c.icon}); font-size:0; border-radius:50%; background-size:contain; background-repeat:no-repeat; background-position:center; width:34px; height:34px; background-color:white; border:2px solid #eee;`;
                }
                return `<div class="p-btn" data-type="crop" data-id="${c.id}"><div style="${style}">${content}</div><span>${c.name}</span></div>`;
            }).join('');
            document.getElementById('p-crops').innerHTML = cropHtml;

            const workHtml = state.master.works.map(w => {
                let style = "";
                let content = (w.icon && w.icon.length <= 2) ? w.icon : '';
                if (w.icon && w.icon.startsWith('<svg')) {
                    content = w.icon;
                } else if (w.icon && w.icon.length > 2) {
                    style = `background-image:url(${w.icon}); font-size:0; border-radius:50%; background-size:contain; background-repeat:no-repeat; background-position:center; width:34px; height:34px; background-color:white; border:2px solid #eee;`;
                }
                return `<div class="p-btn" data-type="work" data-id="${w.id}"><div style="${style}">${content}</div><span>${w.name}</span></div>`;
            }).join('');
            document.getElementById('p-works').innerHTML = workHtml;
        }

        function setupInteractions() {
            const appMain = document.querySelector('.app-main'); // クロージャ内で正しく参照するために宣言
            let ghost = null, active = null, currentType = '';
            const start = (e) => {
                const t = e.target.closest('.p-btn, .p-icon, .p-mark, .p-bar-line, .p-resize-handle, .p-work-band'); if (!t || t.classList.contains('p-mark-label') || t.style.opacity === '0.3' || t.style.opacity === '0') return;
                active = t; currentType = t.dataset.type || (t.classList.contains('p-resize-handle') ? 'bar-resize' : (t.classList.contains('p-icon') || t.classList.contains('p-bar-line') ? 'bar-move' : 'mark-move'));
                const now = Date.now(); if (now - lastTap < 350) {
                    if (currentType === 'bar-move') openPnl('p', t.dataset.pid);
                    else if (currentType === 'mark-move') openPnl('m', t.dataset.pid, t.dataset.idx);
                    return;
                } lastTap = now;
                const touch = e.touches ? e.touches[0] : e;
                ghost = t.cloneNode(true); ghost.className = 'ghost';
                // アイコンの背景画像なども引き継ぐ
                if (t.classList.contains('p-btn')) {
                    const iconDiv = t.querySelector('div');
                    if (iconDiv) {
                        ghost.style.backgroundImage = iconDiv.style.backgroundImage;
                        ghost.style.backgroundSize = "contain";
                        if (iconDiv.style.backgroundImage) ghost.innerText = "";
                    }
                }
                document.body.appendChild(ghost);
                moveG(touch.clientX, touch.clientY); e.preventDefault();
                document.body.style.userSelect = 'none';
            };
            const move = (e) => {
                if (!ghost) return; const touch = e.touches ? e.touches[0] : e; moveG(touch.clientX, touch.clientY);
                const over = document.elementFromPoint(touch.clientX, touch.clientY);
                const layer = over ? over.closest('.data-layer') : null;
                if (layer) {
                    const rect = layer.getBoundingClientRect(); const isPC = window.innerWidth > 768;
                    const offset = isPC ? (touch.clientX - rect.left) : (touch.clientY - rect.top);
                    const currentDs = (state.zoom < 0.5) ? (isPC ? (window.innerWidth - 140) / 366 : (function(){ const _h = document.querySelector('header'); const _hH = _h ? _h.offsetHeight : 60; return (window.innerHeight - _hH - getMobilePaletteH() - 40) / 365; })()) : (isPC ? 60 : 110) * state.zoom;
                    const d = new Date(2026, 0, 1 + Math.floor(offset / currentDs));
                    const tip = document.getElementById('dateTip'); tip.style.display = 'block'; tip.innerText = (d.getMonth() + 1) + '/' + d.getDate();
                    tip.style.left = (touch.clientX + 15) + 'px'; tip.style.top = (touch.clientY - 40) + 'px';
                }
            };
            const end = (e) => {
                if (!ghost) return; const touch = e.changedTouches ? e.changedTouches[0] : e;
                document.body.style.userSelect = '';
                ghost.style.display = 'none';
                const over = document.elementFromPoint(touch.clientX, touch.clientY);
                const layer = over ? over.closest('.data-layer') : null;
                let changed = false;
                if (layer) {
                    const rect = layer.getBoundingClientRect(); const isPC = window.innerWidth > 768;
                    const offset = isPC ? (touch.clientX - rect.left) : (touch.clientY - rect.top);
                    const currentDs = (state.zoom < 0.5) ? (isPC ? (window.innerWidth - 140) / 366 : (function(){ const _h = document.querySelector('header'); const _hH = _h ? _h.offsetHeight : 60; return (window.innerHeight - _hH - getMobilePaletteH() - 40) / 365; })()) : (isPC ? 60 : 110) * state.zoom;
                    // 時間軸と垂直方向の座標でレーン番号を算出（複数作物が同一圃場にある場合の正確な判定）
                    const crossOffset = isPC ? (touch.clientY - rect.top) : (touch.clientX - rect.left);
                    changed = handleDrop(currentType, formatDate(new Date(2026, 0, 1 + Math.floor(offset / currentDs))), layer.dataset.fieldId, active, crossOffset);
                }
                document.querySelectorAll('.ghost').forEach(g => g.remove());
                ghost = null; dateTip.style.display = 'none';
                if (changed) renderUI();
            };
            const moveG = (x, y) => { if (ghost) { ghost.style.left = (x - 17) + 'px'; ghost.style.top = (y - 17) + 'px'; } };
            document.addEventListener('touchstart', start, { passive: false }); document.addEventListener('touchmove', move, { passive: false }); document.addEventListener('touchend', end);
            document.addEventListener('mousedown', start); document.addEventListener('mousemove', move); document.addEventListener('mouseup', end);
        }

        /* ===== 今日の日付へスクロール ===== */
        function scrollToToday() {
            const isPC = window.innerWidth > 768;
            const grid = document.getElementById('gridScroll');
            if (!grid) return;

            const base = new Date(2026, 0, 1);
            const today = new Date(); today.setHours(0, 0, 0, 0);
            // 2026年の範囲にクランプ
            let todayIdx = Math.floor((today - base) / 86400000);
            todayIdx = Math.max(0, Math.min(364, todayIdx));

            // dsを再計算（renderUIと同じロジック）
            const appMain = document.querySelector('.app-main');
            let ds;
            if (state.zoom < 0.5) {
                if (isPC) ds = (window.innerWidth - 140) / 367;
                else { const _hEl = document.querySelector('header'); ds = (window.innerHeight - (_hEl ? _hEl.offsetHeight : 60) - getMobilePaletteH() - 40) / 365; }
            } else {
                ds = (isPC ? 60 : 110) * state.zoom;
            }

            if (isPC) {
                // 今日を画面左から1/4の位置に表示
                const offset = Math.max(0, todayIdx * ds - grid.clientWidth * 0.25);
                grid.scrollLeft = offset;
            } else {
                // 今日を画面上から1/4の位置に表示
                const offset = Math.max(0, todayIdx * ds - (appMain ? appMain.clientHeight : window.innerHeight) * 0.25);
                grid.scrollTop = offset;
            }
        }

        /* ===== ドラッグスクロール（マウス＋タッチ） ===== */
        function setupDragScroll() {
            const grid = document.getElementById('gridScroll');
            if (!grid) return;

            // インタラクティブ要素のセレクタ（作付けバー操作時はドラッグスクロール無効）
            const INTERACTIVE = '.p-btn, .p-icon, .p-mark, .p-bar-line, .p-resize-handle, .p-work-band, .field-header';

            // ----- マウスドラッグ（PC用） -----
            let mouseDown = false, mStartX = 0, mStartY = 0, mScrollL = 0, mScrollT = 0;

            grid.addEventListener('mousedown', (e) => {
                if (e.target.closest(INTERACTIVE)) return;
                mouseDown = true;
                mStartX = e.clientX; mStartY = e.clientY;
                mScrollL = grid.scrollLeft; mScrollT = grid.scrollTop;
                grid.style.cursor = 'grabbing';
                grid.style.userSelect = 'none';
                e.preventDefault();
            });
            document.addEventListener('mousemove', (e) => {
                if (!mouseDown) return;
                grid.scrollLeft = mScrollL - (e.clientX - mStartX);
                grid.scrollTop  = mScrollT - (e.clientY - mStartY);
            });
            document.addEventListener('mouseup', () => {
                if (!mouseDown) return;
                mouseDown = false;
                grid.style.cursor = '';
                grid.style.userSelect = '';
            });

            // ----- タッチドラッグ（モバイル補助：軸カレンダー側をドラッグしたとき） -----
            // grid-scroll自体はnativeスクロールで動くが、axis-fixed側をドラッグしてもスクロールできるようにする
            const axis = document.getElementById('axisFixed');
            if (!axis) return;
            let touchDown = false, tStartY = 0, tScrollT = 0;

            axis.addEventListener('touchstart', (e) => {
                if (e.target.closest(INTERACTIVE)) return;
                touchDown = true;
                tStartY = e.touches[0].clientY;
                tScrollT = grid.scrollTop;
            }, { passive: true });

            document.addEventListener('touchmove', (e) => {
                if (!touchDown) return;
                const dy = tStartY - e.touches[0].clientY;
                grid.scrollTop = tScrollT + dy;
            }, { passive: true });

            document.addEventListener('touchend', () => { touchDown = false; });
        }

        function handleDrop(type, date, fieldId, target, crossOffset) {
            let changed = false;
            if (type === 'crop') {
                if (!freeCheckPlannings(fieldId)) return false;
                state.plantings.push({ id: 'p' + Date.now(), fieldId, cropId: target.dataset.id, start: date, end: formatDate(new Date(new Date(date).getTime() + 60 * 86400000)), events: [] });
                changed = true;
            } else if (type === 'work') {
                // crossOffset（時間軸と垂直方向の座標）からレーン番号を逆算して対象作付けを特定
                const laneSize = 35;
                const laneIdx = (crossOffset != null) ? Math.max(0, Math.round((crossOffset - 25) / laneSize)) : 0;
                let p = state.plantings.find(x => x.fieldId === fieldId && x.laneIndex === laneIdx && date >= x.start && date <= x.end);
                if (!p) p = state.plantings.find(x => x.fieldId === fieldId && date >= x.start && date <= x.end);
                if (p) { if (target.dataset.id === 'w6') p.hStart = date; else if (target.dataset.id === 'w7') p.hEnd = date; p.events.push({ type: target.dataset.id, date }); changed = true; }
            } else if (type === 'bar-move') {
                const p = state.plantings.find(x => x.id === target.dataset.pid);
                if (p) {
                    // 前年繰り越しバーは画面上の表示開始位置(Jan 1)を基準に移動量を計算する
                    const _base = new Date(2026, 0, 1);
                    const _visualStart = new Date(Math.max(new Date(p.start).getTime(), _base.getTime()));
                    const dDays = diffDays(_visualStart, new Date(date));
                    // 日付が変わる場合 OR 圃場が変わる場合に更新
                    if (dDays !== 0 || p.fieldId !== fieldId) {
                        const moveD = (s) => { if (!s) return null; let nd = new Date(s); nd.setDate(nd.getDate() + dDays); return formatDate(nd); };
                        p.start = moveD(p.start); p.end = moveD(p.end); if (p.hStart) p.hStart = moveD(p.hStart); if (p.hEnd) p.hEnd = moveD(p.hEnd);
                        if (p.events) p.events.forEach(ev => ev.date = moveD(ev.date));
                        p.fieldId = fieldId; // 圃場を移動先に更新（別圃場へのドラッグ移動に対応）
                        changed = true;
                    }
                }
            } else if (type === 'bar-resize') {
                const p = state.plantings.find(x => x.id === target.dataset.pid);
                if (p) { p.end = date; changed = true; }
            } else if (type === 'mark-move') {
                const srcP = state.plantings.find(x => x.id === target.dataset.pid);
                if (srcP) {
                    const ev = srcP.events[parseInt(target.dataset.idx)];
                    // ドロップ先の作付けをlaneIndexで特定（別作物への移動も可能に）
                    const laneSize = 35;
                    const laneIdx = (crossOffset != null) ? Math.max(0, Math.round((crossOffset - 25) / laneSize)) : (srcP.laneIndex || 0);
                    let destP = state.plantings.find(x => x.fieldId === fieldId && x.laneIndex === laneIdx && date >= x.start && date <= x.end);
                    if (!destP) destP = state.plantings.find(x => x.fieldId === fieldId && x.laneIndex === laneIdx);
                    if (!destP) destP = srcP; // どこにも当たらなければ元の作付けに留まる
                    if (destP.id === srcP.id) {
                        // 同じ作付け内: 日付だけ更新
                        ev.date = date;
                        if (ev.type === 'w6') srcP.hStart = date;
                        if (ev.type === 'w7') srcP.hEnd = date;
                    } else {
                        // 別の作付けへ移動: 元から削除して移動先へ追加
                        srcP.events.splice(parseInt(target.dataset.idx), 1);
                        if (ev.type === 'w6') { srcP.hStart = null; destP.hStart = date; }
                        if (ev.type === 'w7') { srcP.hEnd = null; destP.hEnd = date; }
                        ev.date = date;
                        destP.events.push(ev);
                    }
                    changed = true;
                }
            }
            if (changed) save();
            return changed;
        }

        function save() {
            state.updatedAt = Date.now();
            localStorage.setItem(DB_KEY, JSON.stringify(state));
            pushSync();
        }
        function closeModal() { document.getElementById('masterModal').style.display = 'none'; renderUI(); }

        // 指定日付の位置までスクロール（保存後に画面外にならないように）
        function scrollToDate(dateStr) {
            const isPC = window.innerWidth > 768;
            const grid = document.getElementById('gridScroll');
            if (!grid || !dateStr) return;
            const base = new Date(2026, 0, 1);
            const d = new Date(dateStr); d.setHours(0,0,0,0);
            let idx = Math.floor((d - base) / 86400000);
            idx = Math.max(0, Math.min(364, idx));
            const appMain = document.querySelector('.app-main');
            let ds;
            if (state.zoom < 0.5) {
                if (isPC) ds = (window.innerWidth - 140) / 367;
                else { const _hEl = document.querySelector('header'); ds = (window.innerHeight - (_hEl ? _hEl.offsetHeight : 60) - getMobilePaletteH() - 40) / 365; }
            } else {
                ds = (isPC ? 60 : 110) * state.zoom;
            }
            const pos = idx * ds;
            if (isPC) {
                const visW = grid.clientWidth;
                if (pos < grid.scrollLeft || pos > grid.scrollLeft + visW - ds * 30) {
                    grid.scrollLeft = Math.max(0, pos - visW * 0.25);
                }
            } else {
                const visH = grid.clientHeight;
                if (pos < grid.scrollTop || pos > grid.scrollTop + visH - ds * 30) {
                    grid.scrollTop = Math.max(0, pos - visH * 0.25);
                }
            }
        }
        function formatDate(d) { return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); }
        function diffDays(d1, d2) { return Math.round((d2 - d1) / (1000 * 60 * 60 * 24)); }

        /* マスター管理用ロジック */
        function openMaster() {

            let h = `

                    <button class="btn" style="background:var(--primary); height:36px; padding:0 15px;" onclick="searchLocation()">検索</button>

                <button class="btn" style="flex:1; background:var(--primary);" onclick="showMasterList('works')">🔧 作業編集</button>
                <button class="btn" style="flex:1; background:#1565c0;" onclick="showFieldList()">🌾 圃場編集${IS_FREE ? ' (1/1)' : ''}</button>
            </div>

                <div style="display:flex; flex-direction:column; gap:8px;">
                    <input type="text" id="sync-url" value="${state.sync.url || ''}" placeholder="同期URL (https://script.google.com/...)" style="width:100%; height:36px; padding:0 10px; border:1px solid #ccc; border-radius:18px; font-size:12px;">
                    <input type="text" id="sync-key" value="${state.sync.key || ''}" placeholder="アクセスキー" style="width:100%; height:36px; padding:0 10px; border:1px solid #ccc; border-radius:18px; font-size:12px;">
                    <button class="btn" style="background:#2e7d32; height:36px;" onclick="saveSyncSettings()">💾 同期設定を保存して実行</button>

                    <button class="btn" style="background:#e65100; height:40px;" onclick="addDummyData()">📋 サンプルデータを読み込む</button>
                    <button class="btn" style="background:#666; height:40px;" onclick="resetMaster()">🔄 アイコン設定をリセット</button>
