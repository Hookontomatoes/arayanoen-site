        function showMasterList(type) {
            const list = state.master[type];
            let h = list.map((item, idx) => {
                const isSvg = item.icon && item.icon.startsWith('<svg');
                const style = item.icon && item.icon.length > 2 && !isSvg ? `background-image:url(${item.icon}); font-size:0;` : '';
                const content = isSvg ? item.icon : (item.icon && item.icon.length <= 2 ? item.icon : '');
                return `
                <div class="master-item-row" onclick="editMasterItem('${type}', ${idx})">
                    <div class="master-item-icon" style="${style}">${content}</div>
                    <div class="master-item-info">
                        <div class="master-item-name">${item.name}</div>
                    </div>
                    <div style="color:#ccc;">▶</div>
                </div>
                `;
            }).join('');
            h += (IS_FREE && type === 'works') ? `<button class="btn-add" style="opacity:0.5; background:#9e9e9e;" onclick="showUpgradePrompt('カスタム作業タイプ追加')">＋ 新規追加 🔒 Pro版</button>` : `<button class="btn-add" onclick="editMasterItem('${type}', -1)">＋ 新規追加</button>`;
            document.getElementById('master-list-area').innerHTML = h;
        }

        function editMasterItem(type, idx) {
            const isNew = idx === -1;
            const item = isNew ? { id: type[0] + Date.now(), name: '', icon: '' } : state.master[type][idx];

            let h = `
            <div class="master-form">
                <label>アイコン（現在の表示）</label>
                <div style="display:flex; align-items:center; gap:15px; margin:10px 0;">
                    <div id="preview-icon" class="master-item-icon" style="${item.icon && item.icon.length > 2 && !item.icon.startsWith('<svg') ? `background-image:url(${item.icon}); font-size:0;` : ''}">${item.icon && item.icon.startsWith('<svg') ? item.icon : (item.icon && item.icon.length <= 2 ? item.icon : '')}</div>
                    <button class="btn" style="background:#444; font-size:12px; height:auto; padding:8px 12px;" onclick="document.getElementById('file-input').click()">画像を選択/変更</button>
                    <input type="file" id="file-input" style="display:none" accept="image/*" onchange="handleImageUpload(event)">
                </div>
                <label>または絵文字を入力</label>
                <input type="text" id="edit-icon" value="${item.icon && item.icon.length <= 2 ? item.icon : ''}" placeholder="例：🍅" oninput="handleEmojiInput(this)">
                
                <label>名前</label>
                <input type="text" id="edit-name" value="${item.name}" placeholder="名前を入力">
                
                <input type="hidden" id="edit-icon-data" value="${item.icon || ''}">

                <div style="margin-top:20px; display:flex; gap:10px;">
                    <button class="btn" style="flex:1; background:var(--primary);" onclick="saveMasterItem('${type}', ${idx})">保存</button>
                    ${!isNew ? `<button class="btn" style="flex:1; background:#d32f2f;" onclick="deleteMasterItem('${type}', ${idx})">削除</button>` : ''}
                </div>
                <button class="btn-add" style="background:#666; margin-top:10px;" onclick="showMasterList('${type}')">キャンセル</button>
            </div>
            `;
            document.getElementById('master-list-area').innerHTML = h;
        }

        function handleImageUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const base64 = event.target.result;
                document.getElementById('preview-icon').style.backgroundImage = `url(${base64})`;
                document.getElementById('preview-icon').innerText = "";
                document.getElementById('edit-icon-data').value = base64;
                document.getElementById('edit-icon').value = ""; // 絵文字入力をクリア
            };
            reader.readAsDataURL(file);
        }

        function handleEmojiInput(input) {
            const val = input.value;
            if (val.length > 0) {
                document.getElementById('preview-icon').style.backgroundImage = "none";
                document.getElementById('preview-icon').innerText = val;
                document.getElementById('edit-icon-data').value = val;
            }
        }

        function saveMasterItem(type, idx) {
            const name = document.getElementById('edit-name').value;
            const icon = document.getElementById('edit-icon-data').value;
            if (!name) return alert('名前を入力してください');

            if (idx === -1) {
                state.master[type].push({ id: type[0] + Date.now(), name, icon });
            } else {
                state.master[type][idx].name = name;
                state.master[type][idx].icon = icon;
            }
            save();
            showMasterList(type);
            renderUI();
        }

        function deleteMasterItem(type, idx) {
            if (!confirm('この項目を削除しますか？')) return;
            state.master[type].splice(idx, 1);
            save();
            showMasterList(type);
            renderUI();
        }

        /* ===== 圃場管理 ===== */
        function showFieldList() {
            const area = document.getElementById('master-list-area');
            if (!area) return;
            area.innerHTML =
                state.fields.map((f, idx) => {
                    const pCount = state.plantings.filter(p => p.fieldId === f.id).length;
                    const subLines = [
                        f.area ? `📐 ${f.area}` : '',
                        f.note ? `📝 ${f.note}` : '',
                        `作付け ${pCount}件`
                    ].filter(Boolean).join('　');
                    return `
                    <div class="master-item-row" onclick="editField(${idx})" style="cursor:pointer;">
                        <div class="master-item-icon" style="font-size:22px; background:#e8f5e9;">🌾</div>
                        <div class="master-item-info">
                            <div class="master-item-name">${f.name}</div>
                            <div style="font-size:11px; color:#888; margin-top:2px;">${subLines}</div>
                        </div>
                        <div style="color:#ccc; font-size:18px;">▶</div>
                    </div>`;
                }).join('') +
                `<button class="btn-add" onclick="freeCheckFields() && editField(-1)" style="${IS_FREE && state.fields.length >= FREE_MAX_FIELDS ? 'opacity:0.5;' : ''}">＋ 圃場を追加${IS_FREE && state.fields.length >= FREE_MAX_FIELDS ? ' 🔒 Pro版' : ''}</button>`;
        }

        function editField(idx) {
            const isNew = idx === -1;
            const f = isNew ? { name: '', area: '', note: '' } : state.fields[idx];
            const pCount = isNew ? 0 : state.plantings.filter(p => p.fieldId === f.id).length;
            document.getElementById('master-list-area').innerHTML = `
            <div class="master-form">
                <label>圃場名 *</label>
                <input type="text" id="field-name" value="${f.name}" placeholder="例：第1圃場、東ハウス">
                <label>面積（任意）</label>
                <input type="text" id="field-area" value="${f.area || ''}" placeholder="例：10a、0.1ha、30坪">
                <label>メモ（任意）</label>
                <input type="text" id="field-note" value="${f.note || ''}" placeholder="例：水田、ビニールハウス、露地">
                ${!isNew ? `<div style="margin-top:8px; font-size:12px; color:#888;">関連する作付け: ${pCount}件</div>` : ''}
                <div style="margin-top:20px; display:flex; gap:10px;">
                    <button class="btn" style="flex:1; background:var(--primary); height:48px; font-size:15px;" onclick="saveField(${idx})">💾 保存</button>
                    ${!isNew ? `<button class="btn" style="flex:1; background:#d32f2f; height:48px; font-size:15px;" onclick="deleteField(${idx})">🗑️ 削除</button>` : ''}
                </div>
                <button class="btn-add" style="background:#666; margin-top:10px;" onclick="showFieldList()">← キャンセル</button>
            </div>`;
        }

        function saveField(idx) {
            const name = document.getElementById('field-name').value.trim();
            const area = document.getElementById('field-area').value.trim();
            const note = document.getElementById('field-note').value.trim();
            if (!name) { alert('圃場名を入力してください'); return; }
            if (idx === -1) {
                if (!freeCheckFields()) return;
                state.fields.push({ id: 'f' + Date.now(), name, area, note });
            } else {
                state.fields[idx] = { ...state.fields[idx], name, area, note };
            }
            save();
            showFieldList();
            renderUI();
        }

        function deleteField(idx) {
            const f = state.fields[idx];
            const pCount = state.plantings.filter(p => p.fieldId === f.id).length;
            const msg = pCount > 0
                ? `「${f.name}」を削除します。\nこの圃場に登録されている作付け ${pCount}件も一緒に削除されます。\nよろしいですか？`
                : `「${f.name}」を削除しますか？`;
            if (!confirm(msg)) return;
            state.plantings = state.plantings.filter(p => p.fieldId !== f.id);
            state.fields.splice(idx, 1);
            save();
            showFieldList();
            renderUI();
        }

        // 作業タイプのデフォルト色
        function defaultWorkColor(type) {
            const map = { w3:'#1976d2', w4:'#f57c00', w5:'#c62828', w6:'#e65100', w7:'#e65100', w8:'#455a64', w9:'#5d4037', w10:'#388e3c', w11:'#7b1fa2', w12:'#006064' };
            return map[type] || '#607d8b';
        }
        // hex→rgba変換（グラデーション用）
        function hexToRgba(hex, a) {
            hex = hex.replace('#','');
            if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
            const r = parseInt(hex.slice(0,2),16), g = parseInt(hex.slice(2,4),16), b = parseInt(hex.slice(4,6),16);
            return 'rgba('+r+','+g+','+b+','+a+')';
        }

        function openPnl(type, id, idx = null) {
            editTarget = { type, id, idx: idx !== null ? parseInt(idx) : null };

            if (type === 'p') {
                const p = state.plantings.find(x => x.id === id);
                if (!p) return;
                const crop = state.master.crops.find(c => c.id === p.cropId);
                const cropName = crop ? crop.name : '不明';
                const isCarryover = new Date(p.start) < new Date(2026, 0, 1);
                document.getElementById('m-title').innerText = '作付け編集: ' + cropName;
                document.getElementById('m-content').innerHTML =
                    '<div style="margin-bottom:14px;">' +
                    '<label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px;color:#388e3c;font-weight:bold;">' +
                    '<input type="checkbox" id="pnl-carryover"' + (isCarryover ? ' checked' : '') +
                    ' onchange="toggleCarryoverDate()" style="width:18px;height:18px;cursor:pointer;"> ◀ 前年からの続き' +
                    '</label></div>' +
                    '<div style="margin-bottom:12px;">' +
                    '<label style="font-size:12px;color:#888;display:block;margin-bottom:4px;">開始日</label>' +
                    '<input type="date" id="pnl-start" value="' + p.start + '" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:15px;box-sizing:border-box;">' +
                    '</div>' +
                    '<div style="margin-bottom:20px;">' +
                    '<label style="font-size:12px;color:#888;display:block;margin-bottom:4px;">終了日</label>' +
                    '<input type="date" id="pnl-end" value="' + p.end + '" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:15px;box-sizing:border-box;">' +
                    '</div>' +
                    '<button id="pnl-save-btn" class="btn" style="width:100%;height:50px;font-size:15px;margin-bottom:10px;background:#2e7d32;">💾 保存</button>' +
                    '<button id="pnl-del-btn" class="btn" style="width:100%;height:44px;background:#d32f2f;font-size:14px;">削除する</button>';

            } else {
                const p = state.plantings.find(x => x.id === id);
                if (!p) return;
                const evIdx = idx !== null ? parseInt(idx) : null;
                const ev = (evIdx !== null) ? p.events[evIdx] : null;
                if (!ev) return;
                const m = state.master.works.find(x => x.id === ev.type);
                const workName = m ? m.name : '不明';
                const isSpanMode = !!(ev.isSpan || ev.endDate);
                const evColor = ev.color || defaultWorkColor(ev.type);
                const INP = 'width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:15px;box-sizing:border-box;';
                document.getElementById('m-title').innerText = '作業編集: ' + workName;
                document.getElementById('m-content').innerHTML =
                    // 期間 / 単発 切替
                    '<div style="margin-bottom:14px;">' +
                    '<label style="font-size:12px;color:#888;display:block;margin-bottom:8px;font-weight:bold;">表示方法</label>' +
                    '<div style="display:flex;gap:10px;">' +
                    '<label id="lbl-span-y" style="flex:1;display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;font-size:14px;padding:10px;border-radius:10px;border:2px solid ' + (isSpanMode ? '#1565c0' : '#ddd') + ';background:' + (isSpanMode ? '#1565c0' : 'white') + ';color:' + (isSpanMode ? 'white' : '#333') + ';">' +
                    '<input type="radio" name="evspan" id="pnl-span-y" value="1"' + (isSpanMode ? ' checked' : '') + ' style="display:none;"> 📅 期間</label>' +
                    '<label id="lbl-span-n" style="flex:1;display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;font-size:14px;padding:10px;border-radius:10px;border:2px solid ' + (!isSpanMode ? '#1565c0' : '#ddd') + ';background:' + (!isSpanMode ? '#1565c0' : 'white') + ';color:' + (!isSpanMode ? 'white' : '#333') + ';">' +
                    '<input type="radio" name="evspan" id="pnl-span-n" value="0"' + (!isSpanMode ? ' checked' : '') + ' style="display:none;"> 📌 単発</label>' +
                    '</div></div>' +
                    // 開始日
                    '<div style="margin-bottom:12px;">' +
                    '<label style="font-size:12px;color:#888;display:block;margin-bottom:4px;">開始日</label>' +
                    '<input type="date" id="pnl-date" value="' + ev.date + '" style="' + INP + '">' +
                    '</div>' +
                    // 終了日（期間選択時のみ表示）
                    '<div id="pnl-end-row" style="margin-bottom:12px;display:' + (isSpanMode ? 'block' : 'none') + ';">' +
                    '<label style="font-size:12px;color:#888;display:block;margin-bottom:4px;">終了日 <span style="color:#e65100;font-size:11px;">（空欄=終了未定→グラデーション表示）</span></label>' +
                    '<input type="date" id="pnl-enddate" value="' + (ev.endDate || '') + '" style="' + INP + '">' +
                    '</div>' +
                    // 色
                    '<div style="margin-bottom:20px;">' +
                    '<label style="font-size:12px;color:#888;display:block;margin-bottom:6px;">色</label>' +
                    '<input type="color" id="pnl-color" value="' + evColor + '" style="width:100%;height:48px;border:1px solid #ddd;border-radius:8px;cursor:pointer;padding:4px;">' +
                    '</div>' +
                    '<button id="pnl-save-btn" class="btn" style="width:100%;height:50px;font-size:15px;margin-bottom:10px;background:#2e7d32;">💾 保存</button>' +
                    '<button id="pnl-del-btn" class="btn" style="width:100%;height:44px;background:#d32f2f;font-size:14px;">削除する</button>';

                // 期間/単発 ラジオのUI切替
                var _spanY = document.getElementById('pnl-span-y');
                var _spanN = document.getElementById('pnl-span-n');
                var _endRow = document.getElementById('pnl-end-row');
                var _lblY = document.getElementById('lbl-span-y');
                var _lblN = document.getElementById('lbl-span-n');
                function _setSpanUI(isSpan) {
                    _endRow.style.display = isSpan ? 'block' : 'none';
                    _lblY.style.background = isSpan ? '#1565c0' : 'white'; _lblY.style.color = isSpan ? 'white' : '#333'; _lblY.style.borderColor = isSpan ? '#1565c0' : '#ddd';
                    _lblN.style.background = !isSpan ? '#1565c0' : 'white'; _lblN.style.color = !isSpan ? 'white' : '#333'; _lblN.style.borderColor = !isSpan ? '#1565c0' : '#ddd';
                }
                if (_spanY) _spanY.addEventListener('change', function() { _setSpanUI(true); });
                if (_spanN) _spanN.addEventListener('change', function() { _setSpanUI(false); });
            }
            document.getElementById('masterModal').style.display = 'flex';
            // ボタンにイベントリスナーを直接セット（onclickに依存しない確実な方法）
            var _saveBtn = document.getElementById('pnl-save-btn');
            var _delBtn  = document.getElementById('pnl-del-btn');
            if (_saveBtn) _saveBtn.addEventListener('click', function(e) { e.stopPropagation(); savePnl(); });
            if (_delBtn)  _delBtn.addEventListener('click',  function(e) { e.stopPropagation(); handleDelete(); });
        }

        // 前年チェックボックス変更時に開始日を1年前/2026-01-01 に切替
        function toggleCarryoverDate() {
            var cb = document.getElementById('pnl-carryover');
            var si = document.getElementById('pnl-start');
            if (!cb || !si) return;
            if (cb.checked) {
                var d = new Date(si.value || '2026-01-01');
                d.setFullYear(d.getFullYear() - 1);
                si.value = d.toISOString().slice(0, 10);
            } else {
                si.value = '2026-01-01';
            }
        }

        // 保存ボタン共通処理（handleDelete と同じパターン）
        function savePnl() {
            if (!editTarget) { alert('保存エラー: 対象が見つかりません'); return; }
            var type = editTarget.type;
            var id   = editTarget.id;
            var idx  = editTarget.idx;

            if (type === 'p') {
                var p = state.plantings.find(function(x){ return x.id === id; });
                if (!p) { alert('保存エラー: 作付けが見つかりません id=' + id); return; }
                var v1 = document.getElementById('pnl-start');
                var v2 = document.getElementById('pnl-end');
                if (v1 && v1.value) p.start = v1.value;
                if (v2 && v2.value) {
                    if (v2.value < (v1 ? v1.value : p.start)) {
                        alert('終了日は開始日より後の日付を設定してください');
                        return;
                    }
                    p.end = v2.value;
                }
            } else {
                var p2 = state.plantings.find(function(x){ return x.id === id; });
                if (!p2) { alert('保存エラー: 作付けが見つかりません id=' + id); return; }
                var ev = (idx !== null) ? p2.events[idx] : null;
                if (!ev) { alert('保存エラー: 作業が見つかりません idx=' + idx); return; }
                // 期間/単発
                var spanYEl = document.getElementById('pnl-span-y');
                ev.isSpan = !!(spanYEl && spanYEl.checked);
                // 色
                var colorEl = document.getElementById('pnl-color');
                if (colorEl) ev.color = colorEl.value;
                // 日付
                var d1 = document.getElementById('pnl-date');
                var d2 = document.getElementById('pnl-enddate');
                if (d1 && d1.value) {
                    ev.date = d1.value;
                    if (ev.type === 'w6') p2.hStart = d1.value;
                    if (ev.type === 'w7') p2.hEnd   = d1.value;
                }
                if (ev.isSpan && d2 && d2.value) {
                    ev.endDate = d2.value;
                } else {
                    delete ev.endDate;
                }
            }
            save();
            var _scrollDate = (type === 'p') ? (function(){
                var _p2 = state.plantings.find(function(x){ return x.id === id; });
                return _p2 ? _p2.start : null;
            })() : null;
            closeModal();
            if (_scrollDate) scrollToDate(_scrollDate);
        }

        function handleDelete() {
            if (editTarget.type === 'p') state.plantings = state.plantings.filter(x => x.id !== editTarget.id);
            else {
                const p = state.plantings.find(x => x.id === editTarget.id);
                const ev = p.events[editTarget.idx];
                if (ev.type === 'w6') p.hStart = null; if (ev.type === 'w7') p.hEnd = null;
                p.events.splice(editTarget.idx, 1);
            }
            save(); closeModal();
        }

        function resetMaster() {
            if (!confirm('アイコン設定（画像・名前・追加分）をすべてリセットし、デフォルトに戻しますか？')) return;
            state.master = JSON.parse(JSON.stringify(DEFAULT_MASTER));
            save();
            closeModal();
            renderUI();
        }

        // --- デバッグ・テスト用機能 ---
        function addDummyData() {
            if (!confirm('サンプルデータ（2025年分）を読み込みますか？\n読み込み後、「前年比較」ボタンで確認できます。')) return;

            const dummies = [
                { id: 'd1', fieldId: 'f1', cropId: 'c1', start: '2025-04-10', end: '2025-07-20', events: [] },
                { id: 'd2', fieldId: 'f1', cropId: 'c9', start: '2025-09-01', end: '2025-11-15', events: [] },
                { id: 'd3', fieldId: 'f2', cropId: 'c2', start: '2025-05-05', end: '2025-08-10', events: [] },
                { id: 'd4', fieldId: 'f3', cropId: 'c10', start: '2025-03-20', end: '2025-06-15', events: [] }
            ];

            state.plantings = state.plantings.concat(dummies);
            save();
            renderUI();
            alert('サンプルデータ（2025年分）を読み込みました。\n「前年比較」ボタンで確認できます。');
        }

        function clearData() {
            if (!confirm('すべての作付けデータを完全に削除しますか？（マスター設定は維持されます）')) return;
            state.plantings = [];
            save();
            renderUI();
        }

        function buildPrintLayout() {
            let container = document.getElementById('printArea');
            if (!container) return;
            container.innerHTML = '';

            // 白黒印刷用ハッチングパターン（作業種別ごと）
            function getWorkPattern(type) {
                const pats = {
                    w3:  'repeating-linear-gradient(0deg,   rgba(0,0,0,.5) 0 1px, transparent 1px 4px)',
                    w4:  'repeating-linear-gradient(45deg,  rgba(0,0,0,.5) 0 1px, transparent 1px 4px)',
                    w5:  'repeating-linear-gradient(-45deg, rgba(0,0,0,.5) 0 1px, transparent 1px 4px)',
                    w6:  'repeating-linear-gradient(90deg,  rgba(0,0,0,.5) 0 1px, transparent 1px 4px)',
                    w7:  'repeating-linear-gradient(0deg,   rgba(0,0,0,.5) 0 1.5px, transparent 1.5px 3px)',
                    w8:  'repeating-linear-gradient(45deg,rgba(0,0,0,.5) 0 1px,transparent 1px 3px),repeating-linear-gradient(-45deg,rgba(0,0,0,.5) 0 1px,transparent 1px 3px)',
                    w9:  'repeating-linear-gradient(45deg,  rgba(0,0,0,.5) 0 2px, transparent 2px 6px)',
                    w10: 'repeating-linear-gradient(0deg,   rgba(0,0,0,.5) 0 1px, transparent 1px 2px)',
                    w11: 'repeating-linear-gradient(90deg,  rgba(0,0,0,.5) 0 1px, transparent 1px 3px)'
                };
                return pats[type] || '';
            }

            const periods = [
                { title: '2026年度 上半期 (1月〜6月)', start: '2026-01-01', end: '2026-06-30', nori: 'right' },
                { title: '2026年度 下半期 (7月〜12月)', start: '2026-07-01', end: '2026-12-31', nori: 'left' }
            ];

            const laneH = 22; // mm per lane（ラベル高さ込み）
            // 1ページあたりの圃場行合計高さ上限（A4内に収める余裕を持たせる）
            // 297mm - padding(20) - title(14) - dateRow(10) - legend(10) = 243mm → 230mm で余裕をもつ
            const AVAIL_MM = 230;

            // ── ① 全圃場のレーン数・行高さを一括計算（両半期共通） ──────────────────
            const fieldInfos = state.fields.map(f => {
                // shallow コピーで laneIdxPrint を汚染しないようにする
                const fps = state.plantings
                    .filter(p => p.fieldId === f.id)
                    .map(p => Object.assign({}, p));
                fps.sort((a, b) => new Date(a.start) - new Date(b.start));

                const laneBase = new Date(2026, 0, 1);
                const lanes = [];
                fps.forEach(p => {
                    const eff = new Date(Math.max(new Date(p.start).getTime(), laneBase.getTime()));
                    let al = -1;
                    for (let i = 0; i < lanes.length; i++) {
                        if (eff > lanes[i]) { al = i; break; }
                    }
                    if (al === -1) { al = lanes.length; lanes.push(new Date(p.end)); }
                    else { lanes[al] = new Date(p.end); }
                    p.laneIdxPrint = al;
                });
                const rowH = Math.max(30, (lanes.length * laneH) + 6);
                return { field: f, rowH, plantings: fps };
            });

            // ── ② 圃場をページグループに分割（各グループが AVAIL_MM 以内に収まるよう） ──
            const fieldGroups = [];
            let curGroup = [], curH = 0;
            fieldInfos.forEach(fi => {
                if (curGroup.length > 0 && curH + fi.rowH > AVAIL_MM) {
                    fieldGroups.push(curGroup);
                    curGroup = [fi];
                    curH = fi.rowH;
                } else {
                    curGroup.push(fi);
                    curH += fi.rowH;
                }
            });
            if (curGroup.length > 0) fieldGroups.push(curGroup);
            const totalGroups = fieldGroups.length;

            // ── ③ グループ × 半期 でページ生成 ─────────────────────────────────────
            // 出力順：グループ1上半期, グループ1下半期, グループ2上半期, グループ2下半期…
            // 印刷時：左右で上半期+下半期を貼り合わせ、上下でグループ行を重ねる
            fieldGroups.forEach((group, gIdx) => {
                const groupRowTotal = group.reduce((s, fi) => s + fi.rowH, 0);
                // グリッド高さ = 月日ヘッダー(10mm) + 圃場行合計
                const gridHmm = 10 + groupRowTotal;

                periods.forEach(per => {
                    const pg = document.createElement('div');
                    pg.className = 'print-page';

                    const start = new Date(per.start);
                    const end   = new Date(per.end);
                    const totalDays = diffDays(start, end) + 1;
                    const dataAreaWidthPx = 150 * 3.78;
                    const dayW = dataAreaWidthPx / totalDays;

                    let dateHtml = '';
                    for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
                        if (d.getDate() === 1) {
                            dateHtml += `<div class="month-marker-print" style="left:${diffDays(start,d)*dayW}px;">${d.getMonth()+1}月</div>`;
                        }
                    }

                    const usedWorkTypes = new Set();
                    let rowsHtml = '';

                    group.forEach(fi => {
                        const { field: f, rowH, plantings: fPlantings } = fi;
                        let fDataContent = '';

                        fPlantings.forEach(p => {
                            const ps = new Date(p.start), pe = new Date(p.end);
                            if (ps > end || pe < start) return;

                            const vs = ps < start ? start : ps;
                            const ve = pe > end   ? end   : pe;
                            const left   = diffDays(start, vs) * dayW;
                            const width  = (diffDays(vs, ve) + 1) * dayW;
                            const topPos = 5 + (p.laneIdxPrint * laneH);

                            const isCarryover = ps < start;
                            const barBorderStyle = isCarryover
                                ? 'border-left:0.7mm dashed #444;border-radius:0 2.5mm 2.5mm 0;' : '';

                            const crop = state.master.crops.find(c => c.id === p.cropId);
                            let iconHtml = '';
                            if (!isCarryover && crop) {
                                const isSvg = crop.icon && crop.icon.startsWith('<svg');
                                iconHtml = isSvg
                                    ? `<div style="position:absolute;left:-3.5mm;top:-2.5mm;width:7mm;height:7mm;background:white;border:0.3mm solid #8bc34a;border-radius:50%;display:flex;align-items:center;justify-content:center;z-index:10;transform:scale(0.8);">${crop.icon}</div>`
                                    : `<div style="position:absolute;left:-3.5mm;top:-2.5mm;width:7mm;height:7mm;background:white;border:0.3mm solid #8bc34a;border-radius:50%;display:flex;align-items:center;justify-content:center;z-index:10;font-size:10px;">${crop.icon&&crop.icon.length<=2?crop.icon:''}</div>`;
                            }

                            let harvestHtml = '';
                            if (p.hStart) {
                                const phs = new Date(p.hStart), phe = p.hEnd ? new Date(p.hEnd) : pe;
                                if (!(phs > end || phe < start)) {
                                    const vhs = phs < start ? start : phs, vhe = phe > end ? end : phe;
                                    const hLeft  = diffDays(vs, vhs) * dayW;
                                    const hWidth = (diffDays(vhs, vhe) + 1) * dayW;
                                    harvestHtml = `<div style="position:absolute;top:0;left:${hLeft}px;width:${Math.max(2,hWidth)}px;height:5mm;background:#fb8c00;border-radius:2.5mm;opacity:0.8;"></div>`;
                                }
                            }

                            let evBandsHtml = '', evLabelsHtml = '';
                            let labelY = topPos + 5.3;
                            const labelStep = 3.4;

                            let cropCarryLabel = '';
                            if (isCarryover) {
                                cropCarryLabel = `<div style="position:absolute;top:${labelY}mm;left:${left}px;font-size:5pt;white-space:nowrap;color:#333;font-weight:bold;z-index:20;">◀${ps.getMonth()+1}/${ps.getDate()}〜</div>`;
                                labelY += labelStep;
                            }

                            if (p.events) {
                                p.events.forEach(ev => {
                                    const evDate   = new Date(ev.date);
                                    const isSpan   = ev.isSpan || !!ev.endDate;
                                    const evEndDate = isSpan ? (ev.endDate ? new Date(ev.endDate) : pe) : null;
                                    const evColor  = ev.color || defaultWorkColor(ev.type);
                                    const pattern  = getWorkPattern(ev.type);
                                    const patStyle = pattern ? `background-image:${pattern};` : '';
                                    usedWorkTypes.add(ev.type);
                                    const isEvCarryover = evDate < start;

                                    if (isSpan && evEndDate) {
                                        const evStart = isEvCarryover ? start : evDate;
                                        const evEnd   = evEndDate > end ? end : evEndDate;
                                        if (evStart > end || evEnd < start) return;
                                        const evLeft  = diffDays(vs, evStart) * dayW;
                                        const evWidth = (diffDays(evStart, evEnd) + 1) * dayW;
                                        const carryEdge = isEvCarryover ? 'border-left:0.5mm dashed #333;border-radius:0 1mm 1mm 0;' : '';
                                        evBandsHtml += `<div style="position:absolute;top:1mm;left:${evLeft}px;width:${Math.max(3,evWidth)}px;height:2.5mm;background:${evColor};${patStyle}opacity:0.9;border-radius:1mm;border:0.2mm solid rgba(0,0,0,0.35);${carryEdge}overflow:hidden;"></div>`;
                                        const evLabelLeft = diffDays(start, evStart) * dayW;
                                        const startStr = isEvCarryover ? `◀${evDate.getMonth()+1}/${evDate.getDate()}〜` : `${evDate.getMonth()+1}/${evDate.getDate()}〜`;
                                        const endStr   = ev.endDate ? `${new Date(ev.endDate).getMonth()+1}/${new Date(ev.endDate).getDate()}` : '';
                                        evLabelsHtml += `<div style="position:absolute;top:${labelY}mm;left:${evLabelLeft}px;font-size:4.5pt;white-space:nowrap;color:#222;z-index:20;line-height:1.3;">${startStr}${endStr}</div>`;
                                        labelY += labelStep;
                                    } else {
                                        if (evDate < start || evDate > end) return;
                                        const evLeft      = diffDays(vs, evDate) * dayW;
                                        const evLabelLeft = diffDays(start, evDate) * dayW;
                                        const dLabel = `${evDate.getMonth()+1}/${evDate.getDate()}`;
                                        evBandsHtml += `<div style="position:absolute;top:1mm;left:${evLeft}px;width:2.5mm;height:2.5mm;background:${evColor};${patStyle}border-radius:50%;border:0.3mm solid rgba(0,0,0,0.45);"></div>`;
                                        evLabelsHtml += `<div style="position:absolute;top:${labelY}mm;left:${evLabelLeft}px;font-size:4.5pt;white-space:nowrap;color:#222;z-index:20;line-height:1.3;">${isEvCarryover?'◀':''}${dLabel}</div>`;
                                        labelY += labelStep;
                                    }
                                });
                            }

                            fDataContent += `<div style="position:absolute;top:${topPos}mm;left:${left}px;width:${Math.max(2,width)}px;height:5mm;background:#8bc34a;border:0.2mm solid #2e7d32;border-radius:2.5mm;z-index:5;${barBorderStyle}">${harvestHtml}${iconHtml}${evBandsHtml}</div>${cropCarryLabel}${evLabelsHtml}`;
                        });

                        rowsHtml += `<div class="f-row-print" style="height:${rowH}mm;"><div class="f-name-print" style="height:${rowH}mm;">${f.name}</div><div class="f-data-print">${fDataContent}</div></div>`;
                    });

                    // 作業種別凡例
                    let legendHtml = '';
                    if (usedWorkTypes.size > 0) {
                        let legendItems = '';
                        usedWorkTypes.forEach(wid => {
                            const work = state.master.works.find(w => w.id === wid);
                            const wname = work ? work.name : wid;
                            const wcolor = defaultWorkColor(wid);
                            const pattern = getWorkPattern(wid);
                            const patStyle = pattern ? `background-image:${pattern};` : '';
                            legendItems += `<div style="display:flex;align-items:center;gap:0.8mm;margin-right:3.5mm;white-space:nowrap;"><div style="width:4.5mm;height:3mm;background:${wcolor};${patStyle}border:0.2mm solid #444;border-radius:0.8mm;flex-shrink:0;"></div><span style="font-size:6pt;">${wname}</span></div>`;
                        });
                        legendHtml = `<div style="margin-top:1.5mm;padding-top:1mm;border-top:0.3mm solid #888;display:flex;flex-wrap:wrap;align-items:center;"><span style="font-size:6.5pt;font-weight:bold;margin-right:2mm;">【作業凡例】</span>${legendItems}</div>`;
                    }

                    // タイトル：複数グループ時はページ番号を付加
                    const groupLabel = totalGroups > 1 ? `　[圃場グループ ${gIdx+1}/${totalGroups}]` : '';
                    const noriText   = per.nori === 'right'
                        ? `のりしろ（右に下半期ページを貼る）${totalGroups>1 ? '　下に次グループを貼る' : ''}`
                        : `のりしろ（左に上半期ページを貼る）${totalGroups>1 ? '　下に次グループを貼る' : ''}`;

                    pg.innerHTML = `
                        <div class="print-title">
                            <span>${per.title}${groupLabel}</span>
                            <span>HarvestSuite スケジュール Pro | あらや農園™</span>
                        </div>
                        <div class="print-grid" style="height:${gridHmm}mm;">
                            <div class="date-row-print">
                                <div class="date-spacer-print"></div>
                                <div class="date-labels-print">${dateHtml}</div>
                            </div>
                            ${rowsHtml}
                            <div class="nori nori-${per.nori}">
                                <div class="nori-label">${noriText}</div>
                            </div>
                        </div>
                        ${legendHtml}
                    `;
                    container.appendChild(pg);
                });
            });
        }

        async function fetchWeather() {
            const { lat, lon } = state.location;
            if (!lat || !lon) return;

            try {
                // 1. 2026年実績・予報 (Open-Meteo)
                // 年初(1/1)から未来14日間までを取得
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=Asia%2FTokyo&past_days=92&forecast_days=14`);
                const data = await res.json();
                if (data.daily) {
                    data.daily.time.forEach((t, i) => {
                        state.weather[t] = {
                            code: data.daily.weather_code[i],
                            max: data.daily.temperature_2m_max[i],
                            min: data.daily.temperature_2m_min[i]
                        };
                    });
                }

                // 2. 2025年実績（アイコン用のコードも含む）
                const resHist = await fetch(`https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=2025-01-01&end_date=2025-12-31&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=Asia%2FTokyo`);
                const dataHist = await resHist.json();
                if (dataHist.daily) {
                    dataHist.daily.time.forEach((t, i) => {
                        state.histWeather[t] = {
                            code: dataHist.daily.weather_code[i],
                            max: dataHist.daily.temperature_2m_max[i],
                            min: dataHist.daily.temperature_2m_min[i]
                        };
                    });
                }
                save(); renderUI();
            } catch (e) { console.error('Weather fetch error', e); }
        }

        async function searchLocation() {
            const q = document.getElementById('loc-search').value;
            if (!q) return;
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&accept-language=ja`);
            const data = await res.json();
            const area = document.getElementById('loc-results');
            area.innerHTML = data.map(i => `<div class="search-result-item" onclick="setLoc('${i.display_name.replace(/'/g, "")}', ${i.lat}, ${i.lon})">${i.display_name}</div>`).join('');
        }

        function setLoc(name, lat, lon) {
            state.location = { name, lat, lon };
            state.weather = {}; state.histWeather = {};
            save(); openMaster(); fetchWeather();
        }

        function resetLocation() {
            if (!confirm('地点登録を解除しますか？\n天気予報データもクリアされます。')) return;
            state.location = { name: '未設定', lat: null, lon: null };
            state.weather = {}; state.histWeather = {};
            save(); openMaster();
        }

        function useGPS() {
            if (!navigator.geolocation) return alert('お使いのブラウザはGPSに対応していません');

            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = '取得中...';
            btn.disabled = true;

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;

                try {
                    // 座標から住所名を取得 (逆ジオコーディング)
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&accept-language=ja`);
                    const data = await res.json();
                    const name = data.address.city || data.address.town || data.address.village || data.address.suburb || '現在地付近';
                    setLoc(name, lat, lon);
                } catch (e) {
                    setLoc('現在地', lat, lon);
                } finally {
                    btn.innerText = originalText;
                    btn.disabled = false;
                }
            }, (err) => {
                alert('位置情報の取得に失敗しました');
                btn.innerText = originalText;
                btn.disabled = false;
            });
        }

        function saveSyncSettings() {
            const url = document.getElementById('sync-url').value.trim();
            const key = document.getElementById('sync-key').value.trim();
            if (!url || !key) return alert('URLとキーを入力してください');
            state.sync = { url, key };
            save();
            alert('同期設定を保存しました。');
            pullSync(true);
        }

        async function pushSync() {
            if (!state.sync.key || !state.sync.url) return;
            try {
                await fetch(`${state.sync.url}?key=${state.sync.key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(state)
                });
            } catch (e) { console.error('Cloud Sync Push Error', e); }
        }

        async function pullSync(manual = false) {
            if (!state.sync.key || !state.sync.url) return;
            try {
                const res = await fetch(`${state.sync.url}?key=${state.sync.key}`);
                if (res.ok) {
                    const cloudState = await res.json();
                    if (cloudState && cloudState.updatedAt) {
                        // クラウド側の方が新しい場合のみ取り込む（手動の場合は確認を出す）
                        if (cloudState.updatedAt > (state.updatedAt || 0)) {
                            if (!manual || confirm('クラウドに新しいデータがあります。同期しますか？')) {
                                state = cloudState;
                                localStorage.setItem(DB_KEY, JSON.stringify(state));
                                renderUI();
                                if (manual) alert('同期が完了しました。');
                                else console.log('Auto-sync: updated to ' + new Date(state.updatedAt).toLocaleTimeString());
                            }
                        } else if (manual) {
                            alert('現在、最新の状態です。');
                        }
                    }
                }
            } catch (e) {
                if (manual) alert('クラウドからのデータ取得に失敗しました。');
                console.error('Cloud Sync Pull Error', e);
            }
        }

        init();
    </script>
